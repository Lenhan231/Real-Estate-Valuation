services:
  - type: web
    name: real-estate-valuation-api
    runtime: docker
    dockerfilePath: Dockerfile
    autoDeploy: true
    envVars:
      - key: ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: info

  - type: web
    name: real-estate-valuation-streamlit
    runtime: docker
    dockerfilePath: .deployment/Dockerfile.streamlit
    autoDeploy: true
    envVars:
      - key: API_URL
        value: https://real-estate-valuation-88yg.onrender.com
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
      - key: STREAMLIT_SERVER_ENABLEXSRFPROTECTION
        value: "false"
