name: ETL Pipeline - Daily Run

on:
  schedule:
    # Run daily at 2 AM UTC (9 AM Vietnam time)
    - cron: '0 2 * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  etl-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ETL Pipeline
        run: python main.py
        env:
          GITHUB_ACTIONS: 'true'

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push results
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/processed/alonhadat_features.csv data/processed/alonhadat_cleaned.csv data/raw/
          git commit -m "chore: auto ETL pipeline run - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: etl-output
          path: data/processed/
          retention-days: 30

      - name: Pipeline Summary
        if: always()
        run: |
          echo "## ETL Pipeline Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "data/processed/alonhadat_features.csv" ]; then
            ROWS=$(wc -l < data/processed/alonhadat_features.csv)
            echo "✅ **Success**: Processed $((ROWS - 1)) records" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Warning**: No output file generated" >> $GITHUB_STEP_SUMMARY
          fi
          echo "**Timestamp**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
